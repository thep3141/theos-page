<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Theos Page Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>Theos Page Login</h1>
  <p id="status">Prüfe Login-Status ...</p>

  <section id="loginSection" hidden>
    <h2>Einloggen</h2>
    <p>
      <label for="emailInput">E-Mail</label><br />
      <input id="emailInput" type="email" value="theo.kurpierz@gmail.com" autocomplete="email" style="width:280px;" />
    </p>
    <p>
      <label for="passwordInput">Passwort</label><br />
      <input id="passwordInput" type="password" autocomplete="current-password" style="width:280px;" />
    </p>
    <p>
      <button id="loginBtn">Einloggen</button>
      <button id="resetBtn">Passwort-Link anfordern</button>
    </p>
  </section>

  <section id="recoverySection" hidden>
    <h2>Neues Passwort setzen</h2>
    <p>Gib dein neues Passwort ein. Danach kannst du dich normal einloggen.</p>
    <p>
      <label for="newPasswordInput">Neues Passwort</label><br />
      <input id="newPasswordInput" type="password" autocomplete="new-password" style="width:280px;" />
    </p>
    <p>
      <button id="updatePasswordBtn">Passwort speichern</button>
    </p>
  </section>

  <section id="loggedInSection" hidden>
    <h2>Eingeloggt</h2>
    <p>
      <a href="./monster-hunter/index.html">Monster Hunter Tracker öffnen</a>
    </p>
    <p>
      <button id="logoutBtn">Ausloggen</button>
    </p>
  </section>

  <p><a href="./index.html">Zurück zur Landing Page</a></p>

  <script>
    const SUPABASE_URL = "https://nscavwzfdgkzapasoyqk.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5zY2F2d3pmZGdremFwYXNveXFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNjYxOTksImV4cCI6MjA5Njc0MjE5OX0.tL8w0S8eTm_ATDv7wk_VL8Em8PhFtDL1KM4xCRBBnSY";
    const ALLOWED_EMAIL = "theo.kurpierz@gmail.com";

    function isSupabaseConfigured() {
      return SUPABASE_URL.startsWith("https://") && !SUPABASE_ANON_KEY.includes("PASTE_");
    }

    const supabaseClient = isSupabaseConfigured()
      ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
          auth: {
            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true
          }
        })
      : null;

    const statusEl = document.getElementById("status");
    const loginSection = document.getElementById("loginSection");
    const recoverySection = document.getElementById("recoverySection");
    const loggedInSection = document.getElementById("loggedInSection");
    const emailInput = document.getElementById("emailInput");
    const passwordInput = document.getElementById("passwordInput");
    const newPasswordInput = document.getElementById("newPasswordInput");
    const loginBtn = document.getElementById("loginBtn");
    const resetBtn = document.getElementById("resetBtn");
    const updatePasswordBtn = document.getElementById("updatePasswordBtn");
    const logoutBtn = document.getElementById("logoutBtn");

    let isPasswordRecovery = false;

    function showOnly(section) {
      loginSection.hidden = section !== "login";
      recoverySection.hidden = section !== "recovery";
      loggedInSection.hidden = section !== "loggedIn";
    }

    function setStatus(message) {
      statusEl.textContent = message;
    }

    async function refreshUi() {
      if (!supabaseClient) {
        setStatus("Supabase ist noch nicht eingerichtet.");
        showOnly("login");
        loginBtn.disabled = true;
        resetBtn.disabled = true;
        return;
      }

      const { data } = await supabaseClient.auth.getSession();
      const user = data.session?.user || null;

      if (isPasswordRecovery) {
        setStatus("Passwort-Wiederherstellung aktiv.");
        showOnly("recovery");
        return;
      }

      if (user) {
        setStatus("Eingeloggt als " + (user.email || user.id));
        showOnly("loggedIn");
      } else {
        setStatus("Nicht eingeloggt.");
        showOnly("login");
      }
    }

    async function login() {
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (email !== ALLOWED_EMAIL) {
        setStatus("Diese Login-Seite ist nur für " + ALLOWED_EMAIL + " vorgesehen.");
        return;
      }
      if (!password) {
        setStatus("Bitte Passwort eingeben.");
        return;
      }

      setStatus("Logge ein ...");
      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) {
        console.error(error);
        setStatus("Login fehlgeschlagen: " + error.message);
        return;
      }
      passwordInput.value = "";
      await refreshUi();
    }

    async function requestPasswordReset() {
      const email = emailInput.value.trim();
      if (email !== ALLOWED_EMAIL) {
        setStatus("Diese Login-Seite ist nur für " + ALLOWED_EMAIL + " vorgesehen.");
        return;
      }

      setStatus("Sende Passwort-Link ...");
      const redirectTo = window.location.href.split("#")[0].split("?")[0];
      const { error } = await supabaseClient.auth.resetPasswordForEmail(email, { redirectTo });
      if (error) {
        console.error(error);
        setStatus("Passwort-Link konnte nicht gesendet werden: " + error.message);
        return;
      }
      setStatus("Passwort-Link gesendet. Prüfe deine E-Mails.");
    }

    async function updatePassword() {
      const newPassword = newPasswordInput.value;
      if (!newPassword || newPassword.length < 6) {
        setStatus("Bitte ein Passwort mit mindestens 6 Zeichen eingeben.");
        return;
      }

      setStatus("Speichere neues Passwort ...");
      const { error } = await supabaseClient.auth.updateUser({ password: newPassword });
      if (error) {
        console.error(error);
        setStatus("Passwort konnte nicht gespeichert werden: " + error.message);
        return;
      }

      newPasswordInput.value = "";
      isPasswordRecovery = false;
      setStatus("Passwort gespeichert. Du bist eingeloggt.");
      showOnly("loggedIn");
    }

    async function logout() {
      await supabaseClient.auth.signOut();
      await refreshUi();
    }

    loginBtn.addEventListener("click", login);
    resetBtn.addEventListener("click", requestPasswordReset);
    updatePasswordBtn.addEventListener("click", updatePassword);
    logoutBtn.addEventListener("click", logout);
    passwordInput.addEventListener("keydown", event => {
      if (event.key === "Enter") login();
    });
    newPasswordInput.addEventListener("keydown", event => {
      if (event.key === "Enter") updatePassword();
    });

    if (supabaseClient) {
      supabaseClient.auth.onAuthStateChange(async (event, session) => {
        if (event === "PASSWORD_RECOVERY") {
          isPasswordRecovery = true;
          setStatus("Passwort-Wiederherstellung aktiv.");
          showOnly("recovery");
          return;
        }
        if (event === "SIGNED_IN" && !isPasswordRecovery) {
          await refreshUi();
        }
      });
    }

    refreshUi();
  </script>
</body>
</html>
